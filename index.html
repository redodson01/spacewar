<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Spacewar</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000a0d; overflow: hidden; font-family: monospace; }
    canvas { display: block; }

    #editor {
      position: fixed;
      top: 0;
      right: 0;
      width: 420px;
      height: 100vh;
      background: rgba(0, 43, 54, 0.93);
      border-left: 1px solid #073642;
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.2s ease;
      z-index: 10;
    }
    #editor.open { transform: translateX(0); }

    #editor-header {
      padding: 10px 15px;
      color: #2aa198;
      font-size: 14px;
      border-bottom: 1px solid #073642;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    #editor-header .hint { color: #586e75; font-size: 11px; }

    #examples { padding: 8px 15px; border-bottom: 1px solid #073642; }
    #examples select {
      width: 100%;
      background: #073642;
      color: #839496;
      border: 1px solid #073642;
      padding: 4px 6px;
      font-family: monospace;
      font-size: 12px;
    }

    #script-input {
      flex: 1;
      background: rgba(0, 43, 54, 0.5);
      color: #93a1a1;
      border: none;
      border-left: 3px solid transparent;
      padding: 15px;
      font-family: monospace;
      font-size: 13px;
      resize: none;
      outline: none;
      tab-size: 2;
    }
    #script-input:focus {
      border-left-color: #2aa198;
      background: rgba(7, 54, 66, 0.7);
    }

    #editor-controls {
      padding: 8px 15px;
      border-top: 1px solid #073642;
      display: flex;
      gap: 8px;
    }
    #editor-controls button {
      background: #073642;
      color: #2aa198;
      border: 1px solid #2aa198;
      padding: 5px 12px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
    }
    #editor-controls button:hover { background: #2aa198; color: #002b36; }

    #input-bar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      display: none;
      z-index: 20;
      border-top: 1px solid #073642;
    }
    #input-bar.open { display: flex; }
    #input-bar[data-mode="command"] { border-top-color: #2aa198; }
    #input-bar[data-mode="lua"] { border-top-color: #b58900; }
    #input-bar-label {
      padding: 8px 0 8px 12px;
      font-family: monospace;
      font-size: 14px;
      color: #586e75;
      background: rgba(0, 43, 54, 0.9);
    }
    #input-bar[data-mode="command"] #input-bar-label { color: #2aa198; }
    #input-bar[data-mode="lua"] #input-bar-label { color: #b58900; }
    #bar-input {
      flex: 1;
      background: rgba(0, 43, 54, 0.9);
      color: #93a1a1;
      border: none;
      padding: 8px 12px;
      font-family: monospace;
      font-size: 14px;
      outline: none;
    }
  </style>
</head>
<body>
<canvas id="game"></canvas>

<div id="editor">
  <div id="editor-header">
    <span>Lua Script Editor</span>
    <span class="hint">Ctrl/Cmd+Enter to run</span>
  </div>
  <div id="examples">
    <select id="example-select">
      <option value="">Load example...</option>
      <option value="color">Change ship color</option>
      <option value="speed">Speed demon</option>
      <option value="rainbow">Rainbow cycling</option>
      <option value="autofire">Auto-fire</option>
      <option value="orbit">Auto-orbit</option>
    </select>
  </div>
  <textarea id="script-input" spellcheck="false">-- Press / for commands, : for Lua one-liners, or help() for the full API.
--
-- Quick start:
--   ship.color = "#ff0"          -- change color
--   ship.thrust = 0.4            -- faster acceleration
--   ship.fireCooldown = 0.05     -- rapid fire
--   shoot()                      -- fire a projectile
--
-- Per-frame callback:
--   function onUpdate(dt) ... end

ship.color = "#ff0"
print("Ship is now yellow!")
</textarea>
  <div id="editor-controls">
    <button id="run-btn">Run (Ctrl/Cmd+Enter)</button>
    <button id="clear-btn">Clear Script</button>
    <button id="clear-data-btn">Clear Saved Data</button>
  </div>
</div>

<div id="input-bar" data-mode="chat">
  <span id="input-bar-label"></span>
  <input id="bar-input" type="text" maxlength="200">
</div>

<script src="https://cdn.jsdelivr.net/npm/fengari-web@0.1.4/dist/fengari-web.js" integrity="sha384-aqYZ5bBpWDOXcXQUTRXOLnaFjrqrMw1BiHjk/1cz75A3ytQtdNkW1QfTe7kTlLR6" crossorigin="anonymous"></script>
<script type="module" src="src/main.js"></script>
</body>
</html>
